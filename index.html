<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Light Mode (Neumorphism Cool Grey) ── */
  :root {
    --bg: #E0E5EC;
    --fg: #3D4852;
    --muted: #6B7280;
    --surface: #E0E5EC;
    --accent: #6C63FF;
    --accent-light: #8B84FF;
    --accent-teal: #38B2AC;
    --danger: #E57373;
    --neu-extruded:      9px 9px 16px rgb(163,177,198,0.6),  -9px -9px 16px rgba(255,255,255,0.5);
    --neu-extruded-h:   12px 12px 20px rgb(163,177,198,0.7), -12px -12px 20px rgba(255,255,255,0.6);
    --neu-extruded-sm:   5px  5px 10px rgb(163,177,198,0.6),  -5px  -5px 10px rgba(255,255,255,0.5);
    --neu-inset:     inset  6px  6px 10px rgb(163,177,198,0.6), inset  -6px  -6px 10px rgba(255,255,255,0.5);
    --neu-inset-deep: inset 10px 10px 20px rgb(163,177,198,0.7), inset -10px -10px 20px rgba(255,255,255,0.6);
    --neu-inset-sm:  inset  3px  3px  6px rgb(163,177,198,0.6), inset  -3px  -3px  6px rgba(255,255,255,0.5);
    --pill-border: transparent;
  }

  /* ── Dark Mode ── */
  [data-theme="dark"] {
    --bg: #1C1F26;
    --fg: #E2E8F0;
    --muted: #8892A4;
    --surface: #1C1F26;
    --accent: #8B84FF;
    --accent-light: #A8A4FF;
    --accent-teal: #4FD1C5;
    --danger: #FC8181;
    --neu-extruded:      6px  6px 12px rgba(0,0,0,0.45),    -6px  -6px 12px rgba(255,255,255,0.04);
    --neu-extruded-h:    9px  9px 18px rgba(0,0,0,0.55),    -9px  -9px 18px rgba(255,255,255,0.05);
    --neu-extruded-sm:   4px  4px  8px rgba(0,0,0,0.4),     -4px  -4px  8px rgba(255,255,255,0.03);
    --neu-inset:     inset  5px  5px 10px rgba(0,0,0,0.5),  inset  -5px  -5px 10px rgba(255,255,255,0.03);
    --neu-inset-deep: inset  8px  8px 16px rgba(0,0,0,0.6), inset  -8px  -8px 16px rgba(255,255,255,0.04);
    --neu-inset-sm:  inset  3px  3px  6px rgba(0,0,0,0.45), inset  -3px  -3px  6px rgba(255,255,255,0.03);
    --pill-border: rgba(255,255,255,0.06);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: "DM Sans", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
    transition: background 0.35s ease, color 0.35s ease;
  }

  .font-display { font-family: "Plus Jakarta Sans", sans-serif; }

  /* ── App Shell ── */
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 56px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
    gap: 12px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 0;
  }
  /* ── Logo (shy jellyfish) ── */
  .logo-wrap {
    position: relative;
    width: 44px; height: 44px;
    flex-shrink: 0;
  }
  .logo-jellyfish {
    position: absolute; inset: 0;
    font-size: 36px; line-height: 44px;
    text-align: center;
    user-select: none; -webkit-user-select: none;
    cursor: default;
    /* JS controls transform/opacity directly */
    will-change: transform, opacity;
  }
  /* color-burst easter egg — radial particles on jellyfish click */
  .color-burst {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    width: 0; height: 0;
  }
  .burst-dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    transform-origin: center center;
    animation: burst-out 0.55s cubic-bezier(.2,1,.4,1) forwards;
  }
  @keyframes burst-out {
    0%   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    70%  { opacity: 0.8; }
    100% { transform: translate(var(--bx), var(--by)) scale(0); opacity: 0; }
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-5px); }
  }
  .header-title {
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--fg);
    transition: color 0.25s ease, text-shadow 0.25s ease;
  }
  .header-title.electrified {
    color: var(--accent-light);
    text-shadow:
      0 0 6px var(--accent),
      0 0 18px var(--accent),
      0 0 36px var(--accent-teal),
      0 0 2px rgba(255,255,255,0.5);
    animation: electric-flicker 0.1s steps(1) infinite;
  }
  @keyframes electric-flicker {
    0%,100% { opacity: 1;    text-shadow: 0 0 6px var(--accent), 0 0 18px var(--accent), 0 0 36px var(--accent-teal); }
    40%      { opacity: 0.88; text-shadow: 0 0 14px var(--accent), 0 0 32px var(--accent-teal), 0 0 50px var(--accent); }
    70%      { opacity: 0.96; text-shadow: 0 0 4px var(--accent), 0 0 12px var(--accent); }
  }
  .header-sub {
    font-size: 12px; color: var(--muted);
    margin-top: 2px; font-weight: 400;
  }

  /* ── Header Controls ── */
  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  /* Live Pill — standalone, left of toolbar */
  .live-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--bg);
    box-shadow: var(--neu-inset-sm);
    border-radius: 9999px;
    padding: 7px 14px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent-teal);
    box-shadow: 0 0 5px var(--accent-teal);
    flex-shrink: 0;
  }
  .status-dot.offline { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
  .status-dot.live { animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Toolbar groove — lang + theme in one unified container */
  .ctrl-toolbar {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg);
    box-shadow: var(--neu-inset-sm);
    border-radius: 16px;
    padding: 4px;
  }
  .ctrl-divider {
    width: 1px;
    height: 20px;
    background: rgba(163,177,198,0.4);
    margin: 0 2px;
    flex-shrink: 0;
  }
  [data-theme="dark"] .ctrl-divider {
    background: rgba(255,255,255,0.08);
  }

  /* Language Switcher (inside toolbar) */
  .lang-switcher {
    display: flex;
    gap: 2px;
  }
  .lang-btn {
    border: none;
    background: transparent;
    border-radius: 11px;
    padding: 5px 9px;
    font-size: 11px;
    font-weight: 700;
    font-family: "DM Sans", sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: box-shadow 0.25s ease-out, color 0.2s, transform 0.15s;
    outline: none;
    letter-spacing: 0.03em;
    line-height: 1;
  }
  .lang-btn:hover { color: var(--fg); }
  .lang-btn.active {
    background: var(--bg);
    box-shadow: var(--neu-extruded-sm);
    color: var(--accent);
  }
  .lang-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Theme Toggle (inside toolbar) */
  .theme-toggle {
    width: 34px; height: 34px;
    border-radius: 11px;
    border: none;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    cursor: pointer;
    transition: box-shadow 0.25s ease-out, transform 0.2s ease-out, background 0.2s;
    outline: none;
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    background: var(--bg);
    box-shadow: var(--neu-extruded-sm);
    transform: translateY(-1px);
  }
  .theme-toggle:active {
    box-shadow: var(--neu-inset-sm);
    transform: translateY(0.5px);
  }
  .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ── Summary Bar ── */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .summary-card {
    background: var(--bg);
    box-shadow: var(--neu-extruded);
    border-radius: 24px;
    padding: 20px 22px;
    transition: box-shadow 0.3s ease-out, transform 0.3s ease-out;
  }
  .summary-card:hover {
    box-shadow: var(--neu-extruded-h);
    transform: translateY(-2px);
  }
  .summary-card .s-label {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--muted); margin-bottom: 8px;
  }
  .summary-card .s-value {
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.03em; color: var(--fg);
    line-height: 1; margin-bottom: 4px;
  }
  .summary-card .s-value.c-accent { color: var(--accent); }
  .summary-card .s-value.c-teal   { color: var(--accent-teal); }
  .summary-card .s-sub { font-size: 11px; color: var(--muted); font-weight: 400; }

  /* ── Agent Grid ── */
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 20px;
  }

  /* ── Agent Card ── */
  .agent-card {
    background: var(--bg);
    box-shadow: var(--neu-extruded);
    border-radius: 32px;
    padding: 28px;
    transition: box-shadow 0.3s ease-out, transform 0.3s ease-out, opacity 0.2s;
    position: relative;
    cursor: grab;
  }
  .agent-card:hover {
    box-shadow: var(--neu-extruded-h);
    transform: translateY(-2px);
  }
  /* running::after removed — StatusBadge already shows running state in top-right corner */
  /* Drag states */
  .agent-card.dragging {
    opacity: 0.45;
    cursor: grabbing;
    box-shadow: var(--neu-inset) !important;
    transform: scale(0.97) !important;
  }
  .agent-card.drag-over {
    box-shadow: 0 0 0 2px var(--accent), var(--neu-extruded-h) !important;
    transform: translateY(-4px) !important;
  }
  /* Drag handle hint in top-left */
  .drag-hint {
    position: absolute; top: 14px; left: 16px;
    font-size: 11px; color: var(--muted); opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    letter-spacing: 1px;
  }
  .agent-card:hover .drag-hint { opacity: 0.5; }

  /* Card Header */
  .card-header {
    display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px;
  }
  .avatar-well {
    width: 52px; height: 52px; border-radius: 18px;
    background: var(--bg); box-shadow: var(--neu-inset-deep);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .avatar-inner {
    width: 36px; height: 36px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 13px; font-weight: 800;
    box-shadow: var(--neu-extruded-sm);
    color: #fff; flex-shrink: 0;
  }
  .avatar-inner.main      { background: linear-gradient(135deg,#6C63FF,#8B84FF); }
  .avatar-inner.coder     { background: linear-gradient(135deg,#11998e,#38B2AC); }
  .avatar-inner.architect { background: linear-gradient(135deg,#f093fb,#c471ed); }
  .avatar-inner.quality   { background: linear-gradient(135deg,#4facfe,#0099f7); }
  .avatar-inner.writer    { background: linear-gradient(135deg,#fa709a,#fee140); }
  .avatar-inner.default   { background: linear-gradient(135deg,#a8c0ff,#3f2b96); }

  .agent-name-block { flex:1; min-width:0; }
  .agent-name {
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg); margin-bottom: 3px;
  }
  .agent-model {
    font-size: 11px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 180px; font-weight: 400;
  }

  /* Status Badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 9999px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.03em;
    white-space: nowrap; box-shadow: var(--neu-extruded-sm); flex-shrink: 0;
  }
  .status-badge .b-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .status-badge.running { color: var(--accent); }
  .status-badge.running .b-dot { background: var(--accent); animation: blink 1.5s infinite; }
  .status-badge.idle  { color: var(--accent-teal); }
  .status-badge.idle .b-dot  { background: var(--accent-teal); }
  .status-badge.offline { color: var(--muted); }
  .status-badge.offline .b-dot { background: #B0BAC9; }

  /* Task Well */
  .task-well {
    background: var(--bg); box-shadow: var(--neu-inset);
    border-radius: 16px; padding: 12px 14px; margin-bottom: 16px;
    display: flex; align-items: flex-start; gap: 10px; min-height: 50px;
  }
  .task-icon-wrap {
    width: 28px; height: 28px; border-radius: 9px;
    background: var(--bg); box-shadow: var(--neu-extruded-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 1px;
  }
  .task-text {
    font-size: 12px; color: var(--muted); line-height: 1.45;
    word-break: break-word; font-weight: 400; flex:1; padding-top: 4px;
  }
  .task-text.active { color: var(--fg); font-weight: 500; }

  /* Stats */
  .stats-row {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px;
  }
  .stat-well {
    background: var(--bg); box-shadow: var(--neu-inset-deep);
    border-radius: 16px; padding: 12px 8px; text-align: center;
  }
  .stat-val {
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--fg); line-height:1; margin-bottom: 4px;
  }
  .stat-lbl {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted);
  }

  /* Meta row */
  .meta-row {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .meta-pill {
    background: var(--bg); box-shadow: var(--neu-extruded-sm);
    border-radius: 9999px; padding: 4px 10px;
    font-size: 11px; font-weight: 500; color: var(--muted); white-space: nowrap;
  }
  .meta-pill.active-accent { color: var(--accent); box-shadow: var(--neu-inset-sm); }
  .last-seen { font-size: 11px; color: var(--muted); font-weight: 400; white-space: nowrap; }

  /* Subagents */
  .subagents-section {
    margin-bottom: 16px; background: var(--bg);
    box-shadow: var(--neu-inset); border-radius: 16px; padding: 12px 14px;
  }
  .subagents-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); margin-bottom: 8px;
  }
  .subagent-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .subagent-row + .subagent-row { border-top: 1px solid rgba(163,177,198,.2); }
  .subagent-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 5px rgba(108,99,255,.4);
    animation: blink 1.5s infinite; flex-shrink: 0;
  }
  .subagent-label {
    font-size: 11px; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex:1;
  }

  /* Buttons */
  .actions-row { display: flex; gap: 8px; }
  .btn {
    flex:1; padding: 10px 8px; border-radius: 16px; border: none;
    background: var(--bg); box-shadow: var(--neu-extruded-sm);
    color: var(--muted); font-size: 12px; font-weight: 700;
    font-family: "DM Sans", sans-serif; cursor: pointer;
    transition: box-shadow 0.3s ease-out, transform 0.3s ease-out, color 0.2s;
    text-align: center; outline: none;
  }
  .btn:hover:not(:disabled) { box-shadow: var(--neu-extruded); transform: translateY(-1px); color: var(--fg); }
  .btn:active:not(:disabled) { box-shadow: var(--neu-inset-sm); transform: translateY(.5px); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn.primary { color: var(--accent); }
  .btn.danger:hover:not(:disabled) { color: var(--danger); }
  .btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: var(--neu-inset-sm); }

  /* Error */
  .error-banner {
    background: var(--bg); box-shadow: var(--neu-extruded);
    border-radius: 20px; padding: 16px 20px; color: var(--danger);
    margin-bottom: 24px; font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 10px;
  }

  /* Skeleton */
  .skeleton-card { background: var(--bg); box-shadow: var(--neu-extruded); border-radius: 32px; padding: 28px; }
  .skeleton-line {
    background: linear-gradient(90deg,
      rgba(163,177,198,.25) 25%, rgba(255,255,255,.4) 50%, rgba(163,177,198,.25) 75%);
    background-size: 200% 100%;
    animation: skel 1.6s infinite;
    border-radius: 8px; height: 12px;
  }
  [data-theme="dark"] .skeleton-line {
    background: linear-gradient(90deg,
      rgba(255,255,255,.04) 25%, rgba(255,255,255,.09) 50%, rgba(255,255,255,.04) 75%);
    background-size: 200% 100%;
  }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Empty */
  .empty-state { text-align: center; padding: 80px 0; color: var(--muted); }
  .empty-state .empty-icon {
    display: block; margin: 0 auto 16px;
    animation: float 3s ease-in-out infinite;
  }

  /* ── Context Bar ── */
  .ctx-section {
    margin-bottom: 16px;
  }
  .ctx-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .ctx-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted);
  }
  .ctx-numbers {
    font-size: 10px; color: var(--muted); font-weight: 500;
    transition: color 0.4s ease;
  }
  .ctx-section.warn     .ctx-numbers { color: #e8973a; }
  .ctx-section.critical .ctx-numbers { color: var(--danger); }
  .ctx-track {
    height: 7px; border-radius: 9999px;
    background: var(--bg); box-shadow: var(--neu-inset-sm);
    overflow: hidden; position: relative;
  }
  .ctx-fill {
    height: 100%; border-radius: 9999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-teal));
    transition: width 0.6s cubic-bezier(.34,1,.64,1);
    position: relative;
  }
  /* shimmer removed per design decision */
  .ctx-fill.warn {
    background: linear-gradient(90deg, #f6a623, var(--danger));
  }
  .ctx-fill.critical {
    background: linear-gradient(90deg, var(--danger), #ff6b6b);
    animation: pulse-fill 1s ease-in-out infinite;
  }
  @keyframes pulse-fill { 0%,100%{opacity:1} 50%{opacity:0.7} }

  /* ── Card Expand Panel ── */
  .expand-panel {
    margin: 0 0 10px;
    padding: 10px 12px;
    border-radius: 12px;
    box-shadow: var(--neu-inset-sm);
    background: var(--bg);
    animation: expandIn 0.22s cubic-bezier(.34,1.56,.64,1);
    overflow: hidden;
  }
  @keyframes expandIn {
    from { opacity: 0; transform: scaleY(0.85); transform-origin: top; }
    to   { opacity: 1; transform: scaleY(1); }
  }
  .expand-task-full {
    font-size: 12px; color: var(--fg); line-height: 1.6;
    word-break: break-word; margin-bottom: 6px;
  }
  .expand-subs { display: flex; flex-direction: column; gap: 4px; }
  .expand-sub-row { display: flex; align-items: center; gap: 6px; }

  /* ── Log Drawer ── */
  .drawer-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: flex-end;
    animation: fadeIn 0.2s ease;
  }

const LangCtx  = createContext({ lang: "zh", t: k => k });

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtTokens(n) {
  if (!n) return "0";
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
  if (n >= 1_000)     return (n / 1_000).toFixed(1) + "K";
  return String(n);
}
function fmtCost(usd) {
  if (!usd) return "$0.00";
  if (usd < 0.01) return "<$0.01";
  return "$" + usd.toFixed(2);
}
function useTimeAgo(t) {
  const { t: tr } = useContext(LangCtx);
  if (!t) return tr.never;
  const diff = (Date.now() - new Date(t).getTime()) / 1000;
  if (diff < 30)   return tr.justNow;
  if (diff < 60)   return tr.secondsAgo(Math.floor(diff));
  if (diff < 3600) return tr.minutesAgo(Math.floor(diff / 60));
  if (diff < 86400)return tr.hoursAgo(Math.floor(diff / 3600));
  return tr.daysAgo(Math.floor(diff / 86400));
}
function avatarClass(id) {
  return ["main","coder","architect","quality","writer"].includes(id.toLowerCase())
    ? id.toLowerCase() : "default";
}
function avatarText(name) {
  const m = { main:"PM", coder:"Co", architect:"Ar", quality:"QA", writer:"Wr" };
  return m[name.toLowerCase()] || name.slice(0,2).toUpperCase();
}

// ── Components ───────────────────────────────────────────────────────────────

// 水母色盘：点击循环切换主色调（变色灵感来自章鱼/水母的生物变色特性）
const JELLY_PALETTES = [
  // [body, tentacle, glow]
  ["#6C63FF", "#38B2AC", "rgba(108,99,255,.45)"],   // indigo (default)
  ["#38B2AC", "#68D391", "rgba(56,178,172,.45)"],   // teal
  ["#F687B3", "#FBB6CE", "rgba(246,135,179,.45)"],  // pink
  ["#F6AD55", "#FBD38D", "rgba(246,173,85,.45)"],   // amber
  ["#76E4F7", "#90CDF4", "rgba(118,228,247,.45)"],  // sky
  ["#9F7AEA", "#B794F4", "rgba(159,122,234,.45)"],  // purple
];

// running 形态：触手变粗变长，眼睛变亮，顶部轮廓微微扩张——「工作状态」
function JellyfishSVG({ bodyColor, tentacleColor, glowColor, running }) {
  // running 时触手振幅更大、眼睛变大、顶弧更饱满
  const eyeR   = running ? 2.2 : 1.5;
  const twBase = running ? 2.0 : 1.5;
  const topArc = running ? "M6 21 C6 11 13 6 20 6 C27 6 34 11 34 21" : "M7 21 C7 12 13 7 20 7 C27 7 33 12 33 21";
  const midArc = running ? "M6 21 Q20 26 34 21" : "M7 21 Q20 25 33 21";
  const eyeGlow = running ? 0.95 : 0.8;
  return (
    <svg
      width="40" height="40" viewBox="0 0 40 40" fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
      style={{
        display: 'block',
        filter: `drop-shadow(0 0 ${running ? 9 : 6}px ${glowColor})`,
        transition: 'filter 0.5s ease',
      }}
    >
      <path d={topArc} stroke={bodyColor} strokeWidth={running ? 2.4 : 2} strokeLinecap="round"
        style={{transition: 'all 0.5s cubic-bezier(.34,1.56,.64,1)'}}/>
      <path d="M11 20 C11 14 15 10 20 10 C25 10 29 14 29 20" stroke={bodyColor} strokeWidth="1"
        strokeLinecap="round" strokeOpacity={running ? 0.6 : 0.4}
        style={{transition: 'stroke-opacity 0.5s ease'}}/>
      <path d={midArc} stroke={bodyColor} strokeWidth={running ? 2.4 : 2} strokeLinecap="round"
        style={{transition: 'all 0.5s cubic-bezier(.34,1.56,.64,1)'}}/>
      {/* 触手 — running 时加快摆动用 CSS animateMotion，这里只控制粗细 */}
      <path d="M12 22 Q10 26 12 30 Q11 34 13 37" stroke={tentacleColor} strokeWidth={twBase} strokeLinecap="round"
        style={{transition: 'stroke-width 0.5s ease'}}/>
      <path d="M16 23 Q15 27 16 31 Q15 34 17 37" stroke={bodyColor} strokeWidth={twBase} strokeLinecap="round" strokeOpacity="0.75"
        style={{transition: 'stroke-width 0.5s ease'}}/>
      <path d="M20 24 Q19 28 20 32 Q19 35 21 38" stroke={tentacleColor} strokeWidth={twBase} strokeLinecap="round"
        style={{transition: 'stroke-width 0.5s ease'}}/>
      <path d="M24 23 Q25 27 24 31 Q25 34 23 37" stroke={bodyColor} strokeWidth={twBase} strokeLinecap="round" strokeOpacity="0.75"
        style={{transition: 'stroke-width 0.5s ease'}}/>
      <path d="M28 22 Q30 26 28 30 Q29 34 27 37" stroke={tentacleColor} strokeWidth={twBase} strokeLinecap="round"
        style={{transition: 'stroke-width 0.5s ease'}}/>
      {/* 眼睛 — running 时瞳孔放大，添加双层高光 */}
      <circle cx="16" cy="17" r={eyeR} fill={bodyColor} style={{transition: 'r 0.5s cubic-bezier(.34,1.56,.64,1)'}}/>
      <circle cx="24" cy="17" r={eyeR} fill={bodyColor} style={{transition: 'r 0.5s cubic-bezier(.34,1.56,.64,1)'}}/>
      <circle cx="16.6" cy="16.4" r={running ? 0.75 : 0.5} fill="white" fillOpacity={eyeGlow}
        style={{transition: 'all 0.4s ease'}}/>
      <circle cx="24.6" cy="16.4" r={running ? 0.75 : 0.5} fill="white" fillOpacity={eyeGlow}
        style={{transition: 'all 0.4s ease'}}/>
      {/* running 时追加额外内发光环 */}
      {running && (
        <ellipse cx="20" cy="19" rx="7" ry="3" stroke={bodyColor} strokeWidth="0.6" strokeOpacity="0.3" fill="none"/>
      )}
    </svg>
  );
}

function JellyfishLogo({ running = false, onElectric }) {
  const jellyRef    = React.useRef(null);
  const wrapRef     = React.useRef(null);
  const paletteRef  = React.useRef(0);
  const floatRafRef = React.useRef(null);
  const floatTRef   = React.useRef(0);
  const [palette,   setPalette]   = React.useState(0);
  const [burstDots, setBurstDots] = React.useState([]);

  // 点击：弹动变色 + 粒子爆发
  const handleClick = React.useCallback(() => {
    const next = (paletteRef.current + 1) % JELLY_PALETTES.length;
    paletteRef.current = next;
    setPalette(next);

    const colors = JELLY_PALETTES[next];
    const dots = Array.from({length: 8}, (_, i) => {
      const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.4;
      const r     = 22 + Math.random() * 14;
      return {
        id: Date.now() + i,
        bx: `${Math.cos(angle) * r}px`,
        by: `${Math.sin(angle) * r}px`,
        color: colors[i % 2],
        delay: `${i * 0.03}s`,
      };
    });
    setBurstDots(dots);
    setTimeout(() => setBurstDots([]), 700);

    // 弹动
    const el = jellyRef.current;
    if (!el) return;
    el.style.transition = "transform 0.15s cubic-bezier(.4,0,.2,1)";
    el.style.transform  = "scale(1.35) rotate(12deg)";
    setTimeout(() => {
      el.style.transition = "transform 0.4s cubic-bezier(.34,1.56,.64,1)";
      el.style.transform  = "translateY(0) rotate(0deg) scale(1)";
    }, 150);
  }, []);

  React.useEffect(() => {
    const el = jellyRef.current;
    if (!el) return;

    // running 时浮动幅度更大、频率更快
    const doFloat = () => {
      const speed = running ? 0.032 : 0.018;
      const amp   = running ? 9     : 6;
      floatTRef.current += speed;
      const y = Math.sin(floatTRef.current)       * amp;
      const r = Math.sin(floatTRef.current * 0.7) * (running ? 5 : 3);
      el.style.transform = `translateY(${y}px) rotate(${r}deg)`;
      el.style.opacity   = "1";
      floatRafRef.current = requestAnimationFrame(doFloat);
    };
    floatRafRef.current = requestAnimationFrame(doFloat);

    return () => cancelAnimationFrame(floatRafRef.current);
  }, [running]);   // running 变化时重启动效

  // 放电：running 时随机间隔触发 onElectric，点亮旁边的标题文字
  React.useEffect(() => {
    if (!running || !onElectric) return;
    let tid;
    const schedule = () => {
      tid = setTimeout(() => {
        onElectric(true);
        setTimeout(() => onElectric(false), 300 + Math.random() * 350);
        schedule();
      }, 2000 + Math.random() * 3000);
    };
    schedule();
    return () => clearTimeout(tid);
  }, [running, onElectric]);

  const [bodyColor, tentacleColor, glowColor] = JELLY_PALETTES[palette];

  return (
    <div
      ref={wrapRef}
      className="logo-wrap"
      role="img"
      aria-label="jellyfish"
      onClick={handleClick}
      title="click me ✨"
      style={{cursor: 'pointer'}}
    >
      <div ref={jellyRef} style={{width:'100%', height:'100%'}}>
        <JellyfishSVG
          bodyColor={bodyColor}
          tentacleColor={tentacleColor}
          glowColor={glowColor}
          running={running}
        />
      </div>

      {/* 色彩粒子爆发层 */}
      <div className="color-burst" aria-hidden="true">
        {burstDots.map(dot => (
          <div
            key={dot.id}
            className="burst-dot"
            style={{
              background: dot.color,
              '--bx': dot.bx,
              '--by': dot.by,
              animationDelay: dot.delay,
              boxShadow: `0 0 4px ${dot.color}`,
            }}
          />
        ))}
      </div>
    </div>
  );
}

  const label = { running: t.running, idle: t.idle, offline: t.offline }[status] || status;
  return (

}

// ── Log Drawer ───────────────────────────────────────────────────────────────
function LogDrawer({ agentId, onClose }) {
  const { t } = useContext(LangCtx);
  const [messages, setMessages] = useState(null);
  const [sessionFile, setSessionFile] = useState("");

  useEffect(() => {
    fetch(`${API_BASE}/api/agent/${agentId}/log`)
      .then(r => r.json())
      .then(d => { setMessages(d.messages || []); setSessionFile(d.sessionFile || ""); })
      .catch(() => setMessages([]));
  }, [agentId]);

  // Close on overlay click
  const handleOverlay = (e) => { if (e.target === e.currentTarget) onClose(); };

  // Scroll to bottom on load
  const bodyRef = React.useRef(null);
  useEffect(() => {
    if (messages && bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [messages]);

  return (
    <div className="drawer-overlay" onClick={handleOverlay}>
      <div className="drawer">
        <div className="drawer-header">
          <div>
            <div className="drawer-title">{t.logTitle(agentId)}</div>
            {sessionFile && <div className="drawer-sub">{sessionFile.split("/").slice(-3).join("/")}</div>}
          </div>
          <button className="drawer-close" onClick={onClose}>✕</button>
        </div>
        <div className="drawer-body" ref={bodyRef}>
          {messages === null && <div className="log-loading">{t.logLoading}</div>}
          {messages !== null && messages.length === 0 && <div className="log-empty">{t.logEmpty}</div>}
          {messages !== null && messages.map((msg, i) => (
            <div className="log-msg" key={i}>
              <span className={`log-role ${msg.role}`}>{msg.role}</span>
              <div className="log-content">{msg.content}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Context Bar ──────────────────────────────────────────────────────────────
function ContextBar({ context }) {
  const { t } = useContext(LangCtx);
  const { used = 0, limit = 0, pct = 0 } = context || {};
  if (!limit) return null;

  const fillClass = pct >= 90 ? "critical" : pct >= 70 ? "warn" : "";
  const fmtCtx = n => {
    if (n >= 1_000_000) return (n/1_000_000).toFixed(1)+"M";
    if (n >= 1_000)     return (n/1_000).toFixed(0)+"K";
    return String(n);
  };

  return (
    <div className={`ctx-section ${fillClass}`}>
      <div className="ctx-header">
        <span className="ctx-label">{t.ctx || "Context"}</span>
        <span className="ctx-numbers">{fmtCtx(used)} / {fmtCtx(limit)} &nbsp;·&nbsp; {pct}%</span>
      </div>
      <div className="ctx-track">
        <div className={`ctx-fill ${fillClass}`} style={{width: `${Math.min(pct,100)}%`}} />
      </div>
    </div>
  );
}

// ── Confirm Modal ─────────────────────────────────────────────────────────────
function ConfirmModal({ title, body, onConfirm, onCancel, confirmLabel, cancelLabel, danger }) {
  return (
    <div className="modal-overlay" onClick={e => { if (e.target===e.currentTarget) onCancel(); }}>
      <div className="modal">
        <div className="modal-icon">{danger ? "⚠️" : "❓"}</div>
        <div className="modal-title">{title}</div>
        <div className="modal-body">{body}</div>
        <div className="modal-actions">
          <button className="modal-btn" onClick={onCancel}>{cancelLabel}</button>
          <button className={`modal-btn ${danger ? "confirm-danger" : ""}`} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

function AgentCard({ agent, onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isDragOver, onLogOpen, onStopRequest, onPauseRequest }) {
  const [expanded, setExpanded] = React.useState(false);
  const { t } = useContext(LangCtx);
  const { id, name, status, currentTask, lastSeen, sessions, usage, model, context } = agent;
  const activeSubs = sessions?.activeSubagents || [];
  const ago = useTimeAgo(lastSeen);

  const taskText = currentTask
    || (status === "running" ? t.taskRunning : status === "idle" ? t.taskIdle : t.taskOffline);
  const taskIcon = { running: "⚡", idle: "✓", offline: "—" }[status] || "—";

  const cls = [
    "agent-card",
    status,
    isDragging  ? "dragging"  : "",
    isDragOver  ? "drag-over" : "",
  ].filter(Boolean).join(" ");

  return (
    <div
      className={cls}
      draggable
      onDragStart={onDragStart}
      onDragOver={e => { e.preventDefault(); onDragOver(); }}
      onDrop={e => { e.preventDefault(); onDrop(); }}
      onDragEnd={onDragEnd}
    >
      <span className="drag-hint">⠿⠿</span>
      <div className="card-header" onClick={() => setExpanded(e => !e)} style={{cursor:"pointer"}}>
        <div className="avatar-well">
          <div className={`avatar-inner ${avatarClass(id)}`}>{avatarText(name)}</div>
        </div>
        <div className="agent-name-block">
          <div className="agent-name">{name}</div>
          {model && <div className="agent-model">{model}</div>}
        </div>
        <StatusBadge status={status} />
      </div>

      <div className="task-well">
        <div className="task-icon-wrap">{taskIcon}</div>
        <span className={`task-text ${status === "running" ? "active" : ""}`}>{taskText}</span>
      </div>

      <ContextBar context={context} />

      <div className="stats-row">
        <StatWell val={fmtTokens(usage?.totalTokens)}    label={t.tokens} />
        <StatWell val={fmtTokens(usage?.outputTokens)}   label={t.output} />
        <StatWell val={fmtCost(usage?.estimatedCostUsd)} label={t.cost}   />
      </div>

      <div className="meta-row">
        <div className="pill-group">
          <span className="meta-pill">{t.sessions(sessions?.total || 0)}</span>
          {(sessions?.subagents || 0) > 0 && (
            <span className={`meta-pill ${activeSubs.length > 0 ? "active-accent" : ""}`}>
              {activeSubs.length > 0
                ? t.activeCount(activeSubs.length)
                : t.subagentCount(sessions.subagents)}
            </span>
          )}
        </div>
        <span className="last-seen">{ago}</span>
      </div>

      {activeSubs.length > 0 && (
        <div className="subagents-section">
          <div className="subagents-label">{t.activeSubagents}</div>
          {activeSubs.slice(0,3).map(sa => (
            <div className="subagent-row" key={sa.sessionId}>
              <div className="subagent-dot" />
              <span className="subagent-label">{sa.label || sa.sessionId.slice(0,16)}</span>
            </div>
          ))}
        </div>
      )}

      {expanded && (
        <div className="expand-panel">
          <div className="expand-task-full">{taskText}</div>
          {activeSubs.length > 0 && (
            <div className="expand-subs">
              {activeSubs.map(sa => (
                <div className="expand-sub-row" key={sa.sessionId}>
                  <div className="subagent-dot" />
                  <span className="subagent-label">{sa.label || sa.sessionId.slice(0,24)}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      <div className="actions-row">
        <button className="btn primary" onClick={() => onLogOpen(id)}>{t.viewLog}</button>
        <button className="btn" disabled={status !== "running"} onClick={() => onPauseRequest(id)} title={t.pauseNote}>{t.pause}</button>
        <button className="btn danger" disabled={status !== "running"} onClick={() => onStopRequest(id)}>{t.stop}</button>
      </div>
    </div>
  );
}

function SummaryBar({ agents }) {
  const { t } = useContext(LangCtx);
  const running = agents.filter(a => a.status === "running").length;
  const idle    = agents.filter(a => a.status === "idle").length;
  const offline = agents.filter(a => a.status === "offline").length;
  const cost   = agents.reduce((s,a) => s + (a.usage?.estimatedCostUsd || 0), 0);
  const tokens = agents.reduce((s,a) => s + (a.usage?.totalTokens || 0), 0);
  return (
    <div className="summary-bar">
      <div className="summary-card">
        <div className="s-label">{t.running_count}</div>
        <div className={`s-value font-display ${running > 0 ? "c-accent" : ""}`}>{running}</div>
        <div className="s-sub">{t.totalAgents(agents.length)}</div>
      </div>
      <div className="summary-card">
        <div className="s-label">{t.idle_count}</div>
        <div className="s-value font-display c-teal">{idle}</div>
        <div className="s-sub">{t.offlineCount(offline)}</div>
      </div>
      <div className="summary-card">
        <div className="s-label">{t.total_tokens}</div>
        <div className="s-value font-display">{fmtTokens(tokens)}</div>
        <div className="s-sub">{t.totalRound}</div>
      </div>
      <div className="summary-card">
        <div className="s-label">{t.total_cost}</div>
        <div className="s-value font-display">{fmtCost(cost)}</div>
        <div className="s-sub">{t.estimated}</div>
      </div>
    </div>
  );
}

function SkeletonGrid() {
  return (
    <div className="agents-grid">
      {[1,2,3].map(i => (
        <div className="skeleton-card" key={i}>
          <div style={{display:"flex",gap:14,marginBottom:20,alignItems:"center"}}>
            <div style={{width:52,height:52,borderRadius:18,background:"var(--bg)",boxShadow:"var(--neu-inset-deep)"}} />
            <div style={{flex:1}}>
              <div className="skeleton-line" style={{width:"50%",marginBottom:8}} />
              <div className="skeleton-line" style={{width:"35%",height:9}} />
            </div>
          </div>
          <div className="skeleton-line" style={{marginBottom:10}} />
          <div className="skeleton-line" style={{width:"75%",marginBottom:18}} />
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {[1,2,3].map(j=>(
              <div key={j} style={{background:"var(--bg)",boxShadow:"var(--neu-inset-deep)",borderRadius:16,padding:"12px 8px"}}>
                <div className="skeleton-line" style={{width:"55%",margin:"0 auto 6px"}} />
                <div className="skeleton-line" style={{width:"40%",height:9,margin:"0 auto"}} />
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Sortable Grid ────────────────────────────────────────────────────────────
function SortableGrid({ agents, onLogOpen, onStopRequest, onPauseRequest }) {
  const [order, setOrder] = useState(() => agents.map(a => a.id));
  const [dragId,    setDragId]    = useState(null);
  const [dragOverId, setDragOverId] = useState(null);

  // Keep order in sync when agent list changes (new agent added / removed)
  useEffect(() => {
    setOrder(prev => {
      const current = new Set(agents.map(a => a.id));
      const next = prev.filter(id => current.has(id));
      agents.forEach(a => { if (!next.includes(a.id)) next.push(a.id); });
      return next;
    });
  }, [agents.map(a => a.id).join(",")]);

  const sorted = order
    .map(id => agents.find(a => a.id === id))
    .filter(Boolean);

  const handleDrop = (targetId) => {
    if (!dragId || dragId === targetId) return;
    setOrder(prev => {
      const arr  = [...prev];
      const from = arr.indexOf(dragId);
      const to   = arr.indexOf(targetId);
      arr.splice(from, 1);
      arr.splice(to, 0, dragId);
      return arr;
    });
  };

  return (
    <div className="agents-grid">
      {sorted.map(a => (
        <AgentCard
          key={a.id}
          agent={a}
          isDragging={dragId    === a.id}
          isDragOver={dragOverId === a.id}
          onDragStart={() => setDragId(a.id)}
          onDragOver={() =>  setDragOverId(a.id)}
          onDrop={() =>      handleDrop(a.id)}
          onDragEnd={() => { setDragId(null); setDragOverId(null); }}
          onLogOpen={onLogOpen}
          onStopRequest={onStopRequest}
          onPauseRequest={onPauseRequest}
        />
      ))}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  // Theme
  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const [theme, setTheme] = useState(() => localStorage.getItem("am-theme") || (prefersDark ? "dark" : "light"));
  const toggleTheme = useCallback(() => {
    setTheme(t => { const n = t === "light" ? "dark" : "light"; localStorage.setItem("am-theme", n); return n; });
  }, []);

  // Language
  const [lang, setLang] = useState(() => localStorage.getItem("am-lang") || "zh");
  const switchLang = useCallback(l => { setLang(l); localStorage.setItem("am-lang", l); }, []);
  const t = LOCALES[lang] || LOCALES.zh;

  // Sync theme to DOM
  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);

  // Data
  const [agents, setAgents]         = useState([]);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [connected, setConnected]   = useState(true);
  const [error, setError]           = useState(null);
  const [loading, setLoading]       = useState(true);

  // Overlay state
  const [logAgentId, setLogAgentId]     = useState(null);  // open drawer for this agent
  const [stopAgentId, setStopAgentId]   = useState(null);  // pending stop confirm
  const [pauseAgentId, setPauseAgentId] = useState(null);  // pending pause confirm
  const [toast, setToast]               = useState(null);  // {msg, ok}
  const [electric, setElectric]         = useState(false); // jellyfish discharge

  const showToast = (msg, ok = true) => {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 3000);
  };

  const handleStop = async (agentId) => {
    setStopAgentId(null);
    try {
      const res = await fetch(`${API_BASE}/api/agent/${agentId}/stop`, { method: "POST" });
      const data = await res.json();
      if (data.ok) showToast(t.stopSuccess(agentId), true);
      else showToast(t.stopFail(data.error || "?"), false);
    } catch (e) {
      showToast(t.stopFail(e.message), false);
    }
    fetchAgents();
  };

  const handlePause = async (agentId) => {
    setPauseAgentId(null);
    try {
      const res = await fetch(`${API_BASE}/api/agent/${agentId}/pause`, { method: "POST" });
      const data = await res.json();
      if (data.ok) showToast(t.pauseSuccess(agentId), true);
      else showToast(t.pauseFail(data.error || "?"), false);
    } catch (e) {
      showToast(t.pauseFail(e.message), false);
    }
    fetchAgents();
  };

  const fetchAgents = useCallback(async () => {
    try {
      const res = await fetch(`${API_BASE}/api/agents`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      setAgents(data.agents || []);
      setLastRefresh(new Date());
      setConnected(true); setError(null); setLoading(false);
    } catch {
      setConnected(false);
      setError(t.errorMsg(API_BASE));
      setLoading(false);
    }
  }, [lang]);

  useEffect(() => {
    fetchAgents();
    const timer = setInterval(fetchAgents, POLL_INTERVAL);
    return () => clearInterval(timer);
  }, [fetchAgents]);

  useEffect(() => {
    const running = agents.filter(a => a.status === "running").length;
    document.title = running > 0 ? `[${running}] Agent Monitor` : "Agent Monitor";
  }, [agents]);

  // Time ago for refresh
  const refreshAgo = (() => {
    if (!lastRefresh) return t.connecting;
    const diff = (Date.now() - lastRefresh.getTime()) / 1000;
    let time;
    if (diff < 30)   time = t.justNow;
    else if (diff < 60) time = t.secondsAgo(Math.floor(diff));
    else time = t.minutesAgo(Math.floor(diff / 60));
    return t.refreshed(time);
  })();

  return (
    <ThemeCtx.Provider value={{ theme, toggleTheme }}>
      <LangCtx.Provider value={{ lang, t }}>
        <div className="app">
          {/* Header */}
          <div className="header">
            <div className="header-left">
              <JellyfishLogo running={agents.some(a => a.status === 'running')} onElectric={setElectric} />
              <div>
                <div className={`header-title font-display${electric ? " electrified" : ""}`}>{t.appName}</div>
                <div className="header-sub">{t.appSub}</div>
              </div>
            </div>

            <div className="header-controls">
              {/* Live indicator */}
              <div className="live-pill">
                <div className={`status-dot ${connected ? "live" : "offline"}`} />
                <span className="live-text">{refreshAgo}</span>
              </div>

              {/* Unified toolbar: language + divider + theme */}
              <div className="ctrl-toolbar" role="group" aria-label="Controls">
                <div className="lang-switcher">
                  {Object.keys(LOCALES).map(l => (
                    <button
                      key={l}
                      className={`lang-btn ${lang === l ? "active" : ""}`}
                      onClick={() => switchLang(l)}
                      aria-pressed={lang === l}
                    >
                      {l.toUpperCase()}
                    </button>
                  ))}
                </div>
                <div className="ctrl-divider" />
                <button
                  className="theme-toggle"
                  onClick={toggleTheme}
                  aria-label={theme === "light" ? "Switch to dark mode" : "Switch to light mode"}
                  title={theme === "light" ? "Dark mode" : "Light mode"}
                >
                  {theme === "light"
                    ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <circle cx="12" cy="12" r="5" stroke="currentColor" strokeWidth="2"/>
                        <line x1="12" y1="2" x2="12" y2="4" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="12" y1="20" x2="12" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="2" y1="12" x2="4" y2="12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="20" y1="12" x2="22" y2="12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
                      </svg>
                  }
                </button>
              </div>
            </div>
          </div>

          {/* Error */}
          {error && <div className="error-banner">⚠️ {error}</div>}

          {/* Loading */}
          {loading && !error && <SkeletonGrid />}

          {/* Content */}
          {!loading && agents.length > 0 && (
            <>
              <SummaryBar agents={agents} />
              <SortableGrid
                agents={agents}
                onLogOpen={id => setLogAgentId(id)}
                onStopRequest={id => setStopAgentId(id)}
                onPauseRequest={id => setPauseAgentId(id)}
              />
            </>
          )}

          {/* Empty */}
          {!loading && agents.length === 0 && !error && (
            <div className="empty-state">
              <svg className="empty-icon" width="56" height="56" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style={{opacity:0.45}}>
                <path d="M7 21 C7 12 13 7 20 7 C27 7 33 12 33 21" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round"/>
                <path d="M7 21 Q20 25 33 21" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round"/>
                <path d="M12 22 Q10 26 12 30 Q11 34 13 37" stroke="var(--accent-teal)" strokeWidth="1.5" strokeLinecap="round"/>
                <path d="M16 23 Q15 27 16 31 Q15 34 17 37" stroke="var(--accent)" strokeWidth="1.5" strokeLinecap="round" strokeOpacity="0.75"/>
                <path d="M20 24 Q19 28 20 32 Q19 35 21 38" stroke="var(--accent-teal)" strokeWidth="1.5" strokeLinecap="round"/>
                <path d="M24 23 Q25 27 24 31 Q25 34 23 37" stroke="var(--accent)" strokeWidth="1.5" strokeLinecap="round" strokeOpacity="0.75"/>
                <path d="M28 22 Q30 26 28 30 Q29 34 27 37" stroke="var(--accent-teal)" strokeWidth="1.5" strokeLinecap="round"/>
                <circle cx="16" cy="17" r="1.5" fill="var(--accent)"/>
                <circle cx="24" cy="17" r="1.5" fill="var(--accent)"/>
              </svg>
              {t.noAgents}
            </div>
          )}
        </div>

        {/* Log Drawer */}
        {logAgentId && (
          <LogDrawer agentId={logAgentId} onClose={() => setLogAgentId(null)} />
        )}

        {/* Stop Confirm Modal */}
        {stopAgentId && (
          <ConfirmModal
            title={t.stopConfirmTitle(stopAgentId)}
            body={t.stopConfirmBody}
            confirmLabel={t.stopConfirmOk}
            cancelLabel={t.stopConfirmCancel}
            danger={true}
            onConfirm={() => handleStop(stopAgentId)}
            onCancel={() => setStopAgentId(null)}
          />
        )}

        {/* Pause Confirm Modal */}
        {pauseAgentId && (
          <ConfirmModal
            title={t.pauseConfirmTitle(pauseAgentId)}
            body={t.pauseConfirmBody}
            confirmLabel={t.pauseConfirmOk}
            cancelLabel={t.pauseConfirmCancel}
            danger={false}
            onConfirm={() => handlePause(pauseAgentId)}
            onCancel={() => setPauseAgentId(null)}
          />
        )}

        {/* Toast */}
        {toast && (
          <div style={{
            position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)",
            background:"var(--bg)", boxShadow:"var(--neu-extruded-h)",
            borderRadius:16, padding:"12px 24px",
            fontSize:13, fontWeight:600,
            color: toast.ok ? "var(--accent-teal)" : "var(--danger)",
            zIndex:300, whiteSpace:"nowrap",
            animation:"popIn 0.25s cubic-bezier(.34,1.56,.64,1)",
          }}>
            {toast.ok ? "✓ " : "⚠ "}{toast.msg}
          </div>
        )}
      </LangCtx.Provider>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
